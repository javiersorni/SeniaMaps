<!-- templates/admin/dashboard.html -->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light">

    <div class="container-fluid">

        <div class="row min-vh-100">

            <!-- SIDEBAR -->
            <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

                <h4 class="fw-bold mb-4">
                    <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="32" class="me-2">
                    Admin Panel
                </h4>

                <div class="mb-4">
                    <small class="text-secondary">Usuario conectado</small>

                    <h5 class="mt-2">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${#strings.capitalize(username)}"></span>
                    </h5>
                </div>

                <hr class="border-secondary">

                <!-- MENU -->
                <div class="d-grid gap-2">

                    <a href="/admin/dashboard" class="btn btn-primary text-start">
                        <i class="bi bi-speedometer2"></i>
                        Dashboard
                    </a>

                    <a href="/admin/users/create" class="btn btn-outline-light text-start">
                        <i class="bi bi-person-plus"></i>
                        Alta usuario
                    </a>

                    <a href="/admin/users" class="btn btn-outline-light text-start">
                        <i class="bi bi-clock-history"></i> Gestionar usuarios</i>
                    </a>

                    <a href="/admin/settings" class="btn btn-outline-light text-start">
                        <i class="bi bi-gear"></i>
                        Configuración
                    </a>

                    <a href="/logout" class="btn btn-danger text-start mt-4">
                        <i class="bi bi-box-arrow-right"></i>
                        Cerrar sesión
                    </a>

                </div>

            </div>

            <!-- CONTENT -->
            <div class="col-md-9 col-lg-10 p-4">

                <h1 class="mb-4">Panel de administración</h1>

                <div class="row g-4">

                    <div class="col-md-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5>Dar de alta un Usuario</h5>
                                <p class="text-muted">Añadir un nuevo usuario al sistema</p>
                                <a href="/admin/users/create" class="btn btn-primary btn-sm">Crear</a>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5>Gestión de usuarios</h5>
                                <p class="text-muted">Modificar/Eliminar usuarios</p>
                                <a href="/admin/users" class="btn btn-primary btn-sm">Ver</a>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5>Configuración</h5>
                                <p class="text-muted">Cambiar nombre o password</p>
                                <a href="/admin/settings" class="btn btn-primary btn-sm">Abrir</a>
                            </div>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>

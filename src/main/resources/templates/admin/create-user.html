<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear Usuario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <div class="container-fluid">

        <div class="row min-vh-100">

            <!-- SIDEBAR -->
            <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

                <h3 class="fw-bold mb-4">
                    <i class="bi bi-shield-lock-fill text-primary"></i>
                    Admin Panel
                </h3>

                <div class="mb-4">

                    <small class="text-secondary">
                        Usuario conectado
                    </small>

                    <h5 class="mt-2">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${username}"></span>
                    </h5>

                </div>

                <hr class="border-secondary">

                <!-- MENU -->
                <div class="d-grid gap-2">

                    <a href="/admin/dashboard" class="btn btn-outline-light text-start">
                        <i class="bi bi-speedometer2"></i>
                        Dashboard
                    </a>

                    <a href="/admin/users/create" class="btn btn-outline-light text-start active">
                        <i class="bi bi-person-plus"></i>
                        Alta usuario
                    </a>

                    <a href="/admin/users" class="btn btn-outline-light text-start">
                        <i class="bi bi-clock-history"></i>
                        Gestionar usuarios
                    </a>

                    <a href="/admin/settings" class="btn btn-outline-light text-start">
                        <i class="bi bi-gear"></i>
                        Configuración
                    </a>

                    <a href="/logout" class="btn btn-danger text-start mt-4">
                        <i class="bi bi-box-arrow-right"></i>
                        Cerrar sesión
                    </a>

                </div>

            </div>

            <!-- MAIN CONTENT -->
            <div class="col-md-9 col-lg-10 p-5">

                <div class="mb-4">

                    <h1 class="fw-bold">
                        Crear usuario
                    </h1>

                    <p class="text-muted">
                        Añade nuevos usuarios al sistema
                    </p>

                </div>

                <!-- CARD -->
                <div class="card shadow-sm border-0 rounded-4">

                    <div class="card-body p-4">

                        <form method="post" action="/admin/users/create">

                            <div class="mb-3">

                                <label class="form-label">
                                    Username
                                </label>

                                <input class="form-control" name="username" placeholder="Introduce username" required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input class="form-control" name="email" placeholder="Introduce email" required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input class="form-control" type="password" name="password"
                                    placeholder="Introduce password" required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Rol
                                </label>

                                <select class="form-select" name="rol">

                                    <option value="ROLE_USER">
                                        USER
                                    </option>

                                    <option value="ROLE_ADMIN">
                                        ADMIN
                                    </option>

                                </select>

                            </div>

                            <button class="btn btn-success w-100">

                                <i class="bi bi-person-check"></i>
                                Crear usuario

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>

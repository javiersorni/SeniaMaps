<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Crear Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAVBAR / DASHBOARD -->
    <nav class="navbar navbar-dark bg-dark px-4">

        <a class="navbar-brand" href="/admin/dashboard">
            🛠 Admin Dashboard
        </a>

        <div class="d-flex gap-2">

            <a class="btn btn-outline-light btn-sm" href="/admin/users">
                Usuarios
            </a>

            <a class="btn btn-outline-warning btn-sm" href="/admin/settings">
                Configuración
            </a>

            <a class="btn btn-outline-danger btn-sm" href="/logout">
                Logout
            </a>

        </div>

    </nav>

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <!-- CARD -->
                <div class="card shadow-sm">

                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Crear usuario</h4>
                    </div>

                    <div class="card-body">

                        <form method="post" action="/admin/users/create">

                            <input class="form-control mb-3" name="username" placeholder="Username" required>

                            <input class="form-control mb-3" name="email" placeholder="Email" required>

                            <input class="form-control mb-3" type="password" name="password" placeholder="Password"
                                required>

                            <select class="form-select mb-3" name="rol">
                                <option value="ROLE_USER">USER</option>
                                <option value="ROLE_ADMIN">ADMIN</option>
                            </select>

                            <button class="btn btn-success w-100">
                                Crear usuario
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>

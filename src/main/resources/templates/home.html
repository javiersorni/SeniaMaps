<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="shortcut icon"
        th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}"
        type="image/x-icon">

</head>

<body class="bg-light">

    <div class="container-fluid">

        <div class="row min-vh-100">

            <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

                <h3 class="fw-bold mb-4">

                    <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}"
                        alt="Logo"
                        height="32"
                        class="me-2">

                    SeniaMaps

                </h3>

                <div class="mb-4">

                    <small class="text-secondary">
                        Usuario conectado
                    </small>

                    <h5 class="mt-2">

                        <i class="bi bi-person-circle"></i>

                        <span th:text="${#strings.capitalize(username)}"></span>

                    </h5>

                </div>

                <hr class="border-secondary">

                <div class="d-grid gap-2">

                    <a href="/home" class="btn btn-primary text-start">

                        <i class="bi bi-house-door"></i>
                        Inicio

                    </a>

                    <a href="/history" class="btn btn-outline-light text-start">

                        <i class="bi bi-clock-history"></i>
                        Historial

                    </a>

                    <a href="/favoritos" class="btn btn-outline-light text-start">

                        <i class="bi bi-star"></i>
                        Mis Favoritos

                    </a>

                    <a href="/etiquetas" class="btn btn-outline-light text-start">

                        <i class="bi bi-tags-fill"></i>
                        Gestionar Etiquetas

                    </a>

                    <a href="/settings" class="btn btn-outline-light text-start">

                        <i class="bi bi-gear"></i>
                        Configuración

                    </a>

                    <a href="/logout" class="btn btn-danger text-start mt-4">

                        <i class="bi bi-box-arrow-right"></i>
                        Cerrar sesión

                    </a>

                </div>

            </div>

            <div class="col-md-9 col-lg-10 p-5">

                <div class="mb-5">

                    <h1 class="fw-bold">

                        Bienvenido,

                        <span th:text="${#strings.capitalize(username)}"></span>

                    </h1>

                    <p class="text-muted">
                        Busca negocios cercanos usando Geoapify
                    </p>

                </div>

                <div class="card shadow-sm border-0 rounded-4 mb-5">

                    <div class="card-body p-4">

                        <h3 class="mb-4">

                            <i class="bi bi-search"></i>
                            Buscar negocios

                        </h3>

                        <form id="form-busqueda">

                            <div class="input-group input-group-lg">

                                <input type="text"
                                    id="campo-busqueda"
                                    class="form-control"
                                    placeholder="Ej: mercadona, pizza, farmacia, hotel"
                                    required>

                                <button class="btn btn-primary" type="submit">

                                    <i class="bi bi-search"></i>
                                    Buscar

                                </button>

                            </div>

                            <br>

                            <div class="mb-3">

                                <label class="form-label">
                                    Radio de búsqueda (KM)
                                </label>

                                <input type="number"
                                    id="custom-radius"
                                    class="form-control"
                                    placeholder="Ej: 3.5"
                                    min="0.1"
                                    step="0.1"
                                    value="3">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Número de resultados
                                </label>

                                <input type="number"
                                    id="custom-limit"
                                    class="form-control"
                                    placeholder="Ej: 20"
                                    min="1"
                                    step="1"
                                    value="20">

                            </div>

                        </form>

                        <p id="status" class="mt-3 fw-semibold text-primary"></p>

                    </div>

                </div>

                <div id="resultados" class="row g-4"></div>

            </div>

        </div>

    </div>

    <script th:inline="javascript">

        const urlSearch =
            /*[[@{/api/places}]]*/ '/api/places';

        document.getElementById('form-busqueda')
            .addEventListener('submit', async function (e) {

                e.preventDefault();

                const keyword =
                    document.getElementById('campo-busqueda').value;

                const status =
                    document.getElementById('status');

                let radiusKm =
                    document.getElementById('custom-radius').value;

                let limit =
                    document.getElementById('custom-limit').value;

                const radius =
                    parseFloat(radiusKm) * 1000;

                status.innerHTML =
                    '<i class="bi bi-arrow-repeat"></i> Realizando búsqueda...';

                navigator.geolocation.getCurrentPosition(

                    async function (position) {

                        const lat = position.coords.latitude;

                        const lon = position.coords.longitude;

                        try {

                            const response = await fetch(
                                `${urlSearch}?lat=${lat}&lon=${lon}&keyword=${encodeURIComponent(keyword)}&radius=${radius}&limit=${limit}`
                            );

                            if (response.status === 401 || response.redirected) {

                                alert("Su sesión ha expirado.");

                                window.location.href = "/login";

                                return;
                            }

                            if (!response.ok) {

                                throw new Error(`Error ${response.status}`);

                            }

                            const data =
                                await response.json();

                            mostrarResultados(data);

                            status.innerHTML =
                                `<i class="bi bi-check-circle-fill text-success"></i>
                                Búsqueda completada:
                                ${data.features.length} resultados`;

                        }

                        catch (err) {

                            console.error(err);

                            status.innerHTML =
                                `<i class="bi bi-exclamation-triangle-fill text-danger"></i>
                                Error al realizar la búsqueda.`;

                            alert("Ocurrió un error.");

                        }

                    },

                    function () {

                        status.innerHTML =
                            `<i class="bi bi-geo-alt-fill text-danger"></i>
                            Error de geolocalización.`;

                        alert("No se pudo obtener la ubicación actual.");

                    }

                );

            });

        function mostrarResultados(data) {

            const contenedor =
                document.getElementById("resultados");

            contenedor.innerHTML = "";

            data.features.forEach(f => {

                const p = f.properties || {};

                const idLugar =
                    p.place_id;

                const nombre =
                    p.name || "Sin nombre";

                const direccion =
                    p.formatted || "Sin dirección";

                const userRating =
                    p.userRating ?? null;

                const isFavorite =
                    p.enFavorito === true;

                const ratingBadge =
                    userRating !== null
                        ? `<span class="badge bg-success"
                            id="badge-rating-${idLugar}">
                            ⭐ ${userRating}
                        </span>`
                        : '';

                const favoriteButtonClass =
                    isFavorite
                        ? 'btn-success'
                        : 'btn-outline-warning';

                const favoriteButtonText =
                    isFavorite
                        ? 'Guardado'
                        : 'Añadir';

                const favoriteButtonIcon =
                    isFavorite
                        ? 'bi-star-fill'
                        : 'bi-star';

                contenedor.innerHTML += `

<div class="col-md-6 col-xl-4">

    <div class="card h-100 shadow-sm border-0 rounded-4">

        <div class="card-body d-flex flex-column">

            <div class="mb-3">

                <h5 class="fw-bold mb-2">

                    <i class="bi bi-shop text-primary"></i>

                    ${nombre}

                </h5>

                <p class="text-muted small mb-0">

                    ${direccion}

                </p>

            </div>

            <hr>

            <div class="row g-3 mt-auto">

                <div class="col-12 col-lg-6">

                    <div class="p-3 border rounded-3 bg-light h-100 d-flex flex-column">

                        <div class="d-flex justify-content-between align-items-center mb-2">

                            <span class="fw-semibold small">

                                <i class="bi bi-star-fill text-warning"></i>

                                Rating

                            </span>

                            ${ratingBadge}

                        </div>

                        <input type="number"
                            min="0"
                            max="5"
                            step="0.1"
                            class="form-control form-control-sm mb-2"
                            id="rating-${idLugar}"
                            placeholder="0 - 5">

                        <button class="btn btn-outline-primary btn-sm w-100 mt-auto"
                            onclick="enviarRating('${idLugar}')">

                            Guardar

                        </button>

                    </div>

                </div>

                <div class="col-12 col-lg-6">

                    <div class="p-3 border rounded-3 bg-light h-100 d-flex flex-column">

                        <div class="d-flex justify-content-between align-items-center mb-2">

                            <span class="fw-semibold small">

                                <i class="bi bi-star text-warning"></i>

                                Favoritos

                            </span>

                        </div>

                        <button class="btn btn-sm w-100 mt-auto ${favoriteButtonClass}"
                            id="btn-fav-${idLugar}"
                            ${isFavorite ? 'disabled' : ''}
                            onclick="addFavorito('${idLugar}', '${nombre}', '${direccion}')">

                            <i class="bi ${favoriteButtonIcon}"></i>

                            ${favoriteButtonText}

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
`;
            });

        }

        async function enviarRating(idLugar) {

            const input =
                document.getElementById(`rating-${idLugar}`);

            const rating =
                parseFloat(input.value);

            if (isNaN(rating) || rating < 0 || rating > 5) {

                alert("Introduce un rating válido.");

                return;

            }

            const formData =
                new URLSearchParams();

            formData.append("idLugar", idLugar);

            formData.append("rating", rating);

            try {

                const response = await fetch("/rating/guardar", {

                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/x-www-form-urlencoded"
                    },

                    body: formData

                });

                if (response.status === 401 || response.redirected) {

                    alert("Sesión expirada.");

                    window.location.href = "/login";

                    return;

                }

                let badge =
                    document.getElementById(`badge-rating-${idLugar}`);

                if (!badge) {

                    const container =
                        document.querySelector(`#rating-${idLugar}`)
                            .parentElement
                            .querySelector('.d-flex');

                    badge = document.createElement("span");

                    badge.id = `badge-rating-${idLugar}`;

                    badge.className = "badge bg-success";

                    container.appendChild(badge);

                }

                badge.innerHTML = `⭐ ${rating}`;

                input.value = "";

            }

            catch (err) {

                console.error(err);

                alert("Error al guardar rating.");

            }

        }

        function addFavorito(idLugar, nombre, direccion) {

            fetch('/favoritos/agregar', {

                method: 'POST',

                headers: {
                    'Content-Type':
                        'application/x-www-form-urlencoded'
                },

                body: new URLSearchParams({

                    idLugar: idLugar,

                    nombre: nombre,

                    direccion: direccion || ''

                })

            })

                .then(res => {

                    if (res.status === 401 || res.redirected) {

                        alert("Sesión expirada.");

                        window.location.href = "/login";

                        return;

                    }

                    return res.text();

                })

                .then(data => {

                    if (!data) return;

                    const btn =
                        document.getElementById(`btn-fav-${idLugar}`);

                    if (data === 'OK' || data === 'YA_EXISTE') {

                        btn.className =
                            "btn btn-sm w-100 mt-auto btn-success";

                        btn.innerHTML =
                            `<i class="bi bi-star-fill"></i> Guardado`;

                        btn.disabled = true;

                    }

                    else {

                        alert('Error al añadir');

                    }

                })

                .catch(() => {

                    alert('Error de red');

                });

        }

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mis Favoritos - SeniaMaps</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="shortcut icon"
          th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}"
          type="image/x-icon">
</head>

<body class="bg-light">

<div class="container-fluid">

    <div class="row min-vh-100">

        <!-- SIDEBAR -->
        <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

            <h3 class="fw-bold mb-4">
                <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}"
                     alt="Logo"
                     height="32"
                     class="me-2">
                SeniaMaps
            </h3>

            <div class="mb-4">
                <small class="text-secondary">Usuario conectado</small>

                <h5 class="mt-2">
                    <i class="bi bi-person-circle"></i>
                    <span th:text="${#strings.capitalize(username)}"></span>
                </h5>
            </div>

            <hr class="border-secondary">

            <div class="d-grid gap-2">

                <a href="/home" class="btn btn-outline-light text-start">
                    <i class="bi bi-house-door"></i> Inicio
                </a>

                <a href="/history" class="btn btn-outline-light text-start">
                    <i class="bi bi-clock-history"></i> Historial
                </a>

                <a href="/favoritos" class="btn btn-primary text-start text-white">
                    <i class="bi bi-star-fill"></i> Mis Favoritos
                </a>

                <a href="/settings" class="btn btn-outline-light text-start">
                    <i class="bi bi-gear"></i> Configuración
                </a>

                <a href="/logout" class="btn btn-danger text-start mt-4">
                    <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                </a>

            </div>
        </div>

        <!-- MAIN -->
        <div class="col-md-9 col-lg-10 p-4">

            <h1 class="mb-4">Mis Sitios Favoritos</h1>

            <div class="card shadow-sm border-0 rounded-3">

                <div class="card-body p-0">

                    <div class="table-responsive"
                         th:if="${not #lists.isEmpty(listaFavoritos)}">

                        <table class="table table-hover align-middle mb-0">

                            <thead class="table-light">
                            <tr>
                                <th>Nombre</th>
                                <th>Dirección</th>
                                <th>Rating</th>
                                <th>Categorías</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:each="fav : ${listaFavoritos}">

                                <!-- NOMBRE -->
                                <td th:text="${fav.resultado.nombre}"></td>

                                <!-- DIRECCIÓN -->
                                <td th:text="${fav.resultado.direccion != null ? fav.resultado.direccion : 'No disponible'}"></td>

                                <!-- RATING -->
                                <td>

                                    <div th:if="${fav.resultado.userRating != null}">
                                        <span class="badge bg-success"
                                              th:text="'⭐ ' + ${fav.resultado.userRating}">
                                        </span>
                                    </div>

                                    <div th:if="${fav.resultado.userRating == null}">
                                        <span class="text-muted">Sin rating</span>
                                    </div>

                                </td>

                                <!-- CATEGORÍAS -->
                                <td>
                                    <span th:if="${fav.resultado.categorias != null}"
                                          th:text="${#strings.listJoin(fav.resultado.categorias, ', ')}">
                                    </span>

                                    <span th:if="${fav.resultado.categorias == null}">
                                        Sin categorías
                                    </span>
                                </td>

                                <!-- ACCIONES -->
                                <td class="text-center">

                                    <form th:action="@{/favoritos/eliminar}"
                                          method="post"
                                          class="m-0"
                                          onsubmit="return confirm('¿Eliminar favorito?');">

                                        <input type="hidden"
                                               name="idFavorito"
                                               th:value="${fav.idFavorito}"/>

                                        <button type="submit"
                                                class="btn btn-outline-danger btn-sm">

                                            <i class="bi bi-trash"></i>
                                            Quitar

                                        </button>

                                    </form>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                    <!-- VACÍO -->
                    <div th:if="${#lists.isEmpty(listaFavoritos)}"
                         class="text-center py-5">

                        <i class="bi bi-star text-muted" style="font-size: 3rem;"></i>
                        <h5 class="mt-3">Aún no tienes favoritos</h5>
                        <p class="text-muted">Los lugares guardados aparecerán aquí</p>

                    </div>

                </div>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

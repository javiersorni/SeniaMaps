<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Etiquetas - SeniaMaps</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light">

<div class="container-fluid">
    <div class="row min-vh-100">

        <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

            <h3 class="fw-bold mb-4">
                <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="32" class="me-2">
                SeniaMaps
            </h3>

            <div class="mb-4">
                <small class="text-secondary">Usuario conectado</small>
                <h5 class="mt-2">
                    <i class="bi bi-person-circle"></i>
                    <span th:text="${#strings.capitalize(username)}"></span>
                </h5>
            </div>

            <hr class="border-secondary">

            <div class="d-grid gap-2">

                <a href="/home" class="btn btn-outline-light text-start">
                    <i class="bi bi-house-door"></i> Inicio
                </a>

                <a href="/history" class="btn btn-outline-light text-start">
                    <i class="bi bi-clock-history"></i> Historial
                </a>

                <a href="/favoritos" class="btn btn-outline-light text-start">
                    <i class="bi bi-star-fill"></i> Mis Favoritos
                </a>
                
                <a href="/etiquetas" class="btn btn-primary text-start text-white">
                    <i class="bi bi-tags-fill"></i> Gestionar Etiquetas
                </a>

                <a href="/settings" class="btn btn-outline-light text-start">
                    <i class="bi bi-gear"></i> Configuración
                </a>

                <a href="/logout" class="btn btn-danger text-start mt-4">
                    <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                </a>

            </div>
        </div>

        <div class="col-md-9 col-lg-10 p-4">

            <h1 class="mb-4">Gestión de Etiquetas</h1>

            <div class="row mb-4 align-items-end">
                <div class="col-md-5 col-lg-4">
                    <form method="get" action="/etiquetas" id="filterForm">
                        <label for="tagSelect" class="form-label text-muted small fw-bold">Filtrar por etiqueta:</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-filter"></i></span>
                            <select class="form-select" name="tag" id="tagSelect">
                                <option value="">-- Mostrar todas --</option>
                                <option th:each="t : ${todasLasTags}" 
                                        th:value="${t}" 
                                        th:text="${t}"
                                        th:selected="${t == tagSeleccionada}"></option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="col-md-3" th:if="${tagSeleccionada}">
                    <a href="/etiquetas" class="btn btn-outline-secondary d-inline-flex align-items-center gap-1">
                        <i class="bi bi-x-circle"></i> Limpiar Filtro
                    </a>
                </div>
            </div>

            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-0">

                    <div class="table-responsive" th:if="${not #lists.isEmpty(etiquetas)}">

                        <table class="table table-hover align-middle mb-0">

                            <thead class="table-light">
                            <tr>
                                <th>Resultado / Sitio Guardado</th>
                                <th>Etiqueta Asociada</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="eti : ${etiquetas}">

                                <td class="fw-bold text-dark" th:text="${eti.resultado.nombre}"></td>

                                <td>
                                    <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill font-monospace small px-3 py-2 d-inline-flex align-items-center gap-2">
                                        <i class="bi bi-tag-fill"></i>
                                        <span th:text="${eti.nombreEtiqueta}">etiqueta</span>
                                        
                                        <form method="post" action="/etiquetas/delete-etiqueta" class="d-inline m-0 p-0">
                                            <input type="hidden" name="resultadoId" th:value="${eti.resultado.idResultado}">
                                            <input type="hidden" name="tagName" th:value="${eti.nombreEtiqueta}">
                                            <button type="submit" class="btn-close" style="font-size: 0.55rem; padding: 0.15rem;" title="Eliminar etiqueta"></button>
                                        </form>
                                    </span>
                                </td>

                                <td class="text-center">
                                    <form method="post" action="/etiquetas/delete-favorito" 
                                          th:onsubmit="return confirm('¿Seguro que quieres quitar de favoritos este resultado? Se desvincularán todas las etiquetas.');" class="m-0">
                                        
                                        <input type="hidden" name="resultadoId" th:value="${eti.resultado.idResultado}">
                                        
                                        <button type="submit" class="btn btn-outline-danger btn-sm">
                                            <i class="bi bi-trash"></i> Quitar de Favoritos
                                        </button>
                                    </form>
                                </td>

                            </tr>
                            </tbody>

                        </table>

                    </div>

                    <div th:if="${#lists.isEmpty(etiquetas)}" class="text-center py-5">

                        <i class="bi bi-tags text-muted" style="font-size: 3rem;"></i>

                        <h5 class="mt-3">No hay resultados</h5>

                        <p class="text-muted">No se encontraron sitios con etiquetas que coincidan con la selección.</p>

                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const selectElement = document.getElementById("tagSelect");
        if (selectElement) {
            selectElement.addEventListener("change", function() {
                document.getElementById("filterForm").submit();
            });
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

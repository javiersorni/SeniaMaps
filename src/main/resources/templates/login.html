<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - SeniaMaps</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="shortcut icon"
          th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}"
          type="image/x-icon">

</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <header class="border-bottom shadow-sm" style="background-color:#cdd5b1;">

        <div class="container-fluid px-3">

            <div class="d-flex align-items-center justify-content-between py-2 py-md-3">

                <div class="d-flex align-items-center">

                    <img src="/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg"
                        alt="SeniaMaps"
                        style="height: 80px; max-height: 125px; width: auto; display:block;"
                        class="img-fluid"
                        th:styleappend="'@media (min-width: 768px) { height: 125px !important; }'"
                        onerror="this.onerror=null; this.src='/cropped-CENTRADO-NEGRO-150x150.jpg';">

                </div>

                <h2 class="fw-bold text-success mb-0 pe-2 text-end fs-3 fs-md-1">
                    SeniaMaps
                </h2>

            </div>

        </div>

    </header>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-sm-10 col-md-8 col-lg-5">

                    <div class="card border-0 shadow-sm">

                        <div class="card-body p-4 p-lg-5">

                            <div class="text-center mb-4">

                                <h2 class="fw-bold mb-1">
                                    Iniciar sesión
                                </h2>
                            </div>

                            <div th:if="${param.error}"
                                 class="alert alert-danger d-flex align-items-center">

                                <i class="bi bi-exclamation-triangle-fill me-2"></i>

                                Usuario o contraseña incorrectos

                            </div>

                            <div th:if="${param.logout}"
                                 class="alert alert-success d-flex align-items-center">

                                <i class="bi bi-check-circle-fill me-2"></i>

                                Has cerrado sesión correctamente

                            </div>

                            <form method="post"
                                  action="/login">

                                <div class="mb-4">

                                    <label class="form-label fw-semibold">
                                        Usuario
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text bg-white">
                                            <i class="bi bi-person"></i>
                                        </span>

                                        <input type="text"
                                               name="username"
                                               class="form-control"
                                               placeholder="Introduce tu usuario"
                                               required>

                                    </div>

                                </div>

                                <div class="mb-4">

                                    <label class="form-label fw-semibold">
                                        Contraseña
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text bg-white">
                                            <i class="bi bi-lock"></i>
                                        </span>

                                        <input type="password"
                                               name="password"
                                               class="form-control"
                                               placeholder="Introduce tu contraseña"
                                               required>

                                    </div>

                                </div>

                                <button class="btn btn-success w-100 py-2">

                                    <i class="bi bi-box-arrow-in-right me-2"></i>

                                    Entrar

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <footer class="border-top mt-auto"
            style="background-color: #cdd5b1;">

        <div class="container py-4">

            <div class="d-flex flex-column flex-md-row justify-content-center align-items-center gap-3">

                <a href="https://github.com/javiersorni/SeniaMaps"
                   target="_blank"
                   class="text-decoration-none text-success fw-semibold">

                    <i class="bi bi-github me-1"></i>
                    Proyecto

                </a>

                <a href="https://github.com/javiersorni"
                   target="_blank"
                   class="text-decoration-none text-success fw-semibold">

                    <i class="bi bi-github me-1"></i>
                    Javier Sorní

                </a>

                <a href="https://github.com/elmotche"
                   target="_blank"
                   class="text-decoration-none text-success fw-semibold">

                    <i class="bi bi-github me-1"></i>
                    Marc Pons

                </a>

            </div>

        </div>

    </footer>

    <div class="d-none position-fixed top-50 start-50 translate-middle"
         id="loadingSpinner"
         style="z-index: 9999;">

        <div class="spinner-border text-success"
             role="status">

            <span class="visually-hidden">
                Loading...
            </span>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historial - SeniaMaps</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

                <h3 class="fw-bold mb-4">
                    <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="32"
                        class="me-2">
                    SeniaMaps
                </h3>

                <div class="mb-4">
                    <small class="text-secondary">Usuario conectado</small>
                    <h5 class="mt-2">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${#strings.capitalize(username)}"></span>
                    </h5>
                </div>

                <hr class="border-secondary">

                <div class="d-grid gap-2">
                    <a href="/home" class="btn btn-outline-light text-start">
                        <i class="bi bi-house-door"></i> Inicio
                    </a>
                    <a href="/history" class="btn btn-primary text-start">
                        <i class="bi bi-clock-history"></i> Historial
                    </a>
                    <a href="/favoritos" class="btn btn-outline-light text-start">
                        <i class="bi bi-star"></i> Mis Favoritos
                    </a>
                    <a href="/etiquetas" class="btn btn-outline-light text-start">
                        <i class="bi bi-tags-fill"></i> Gestionar Etiquetas
                    </a>
                    <a href="/settings" class="btn btn-outline-light text-start">
                        <i class="bi bi-gear"></i> Configuración
                    </a>
                    <a href="/logout" class="btn btn-danger text-start mt-4">
                        <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                    </a>
                </div>
            </div>

            <div class="col-md-9 col-lg-10 p-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="fw-bold m-0">Historial de Búsquedas</h1>
                    <button class="btn btn-danger" onclick="borrarHistorial()">
                        <i class="bi bi-trash"></i> Borrar historial
                    </button>
                </div>

                <div th:if="${#lists.isEmpty(historial)}" class="card p-5 text-center shadow-sm">
                    <i class="bi bi-inbox fs-1 text-muted"></i>
                    <p class="mt-3 mb-0">No hay búsquedas todavía</p>
                </div>

                <div th:if="${!#lists.isEmpty(historial)}">
                    <div class="accordion" id="accordionHistorial">
                        <div class="accordion-item" th:each="b : ${historial}">

                            <h2 class="accordion-header" th:id="'h-' + ${b.idBusqueda}">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                    th:data-bs-target="'#c-' + ${b.idBusqueda}">
                                    <strong th:text="${b.query}"></strong>
                                    <span class="ms-3 text-muted small">
                                        (<span th:text="${b.latitud}"></span>, <span th:text="${b.longitud}"></span>)
                                    </span>
                                    <span class="ms-auto badge bg-primary"
                                        th:text="${#lists.size(b.resultados)} + ' resultados'">
                                    </span>
                                </button>
                            </h2>

                            <div class="accordion-collapse collapse" th:id="'c-' + ${b.idBusqueda}">
                                <div class="accordion-body">

                                    <div th:if="${#lists.isEmpty(b.resultados)}" class="text-muted text-center">
                                        Sin resultados
                                    </div>

                                    <table th:if="${!#lists.isEmpty(b.resultados)}" class="table table-hover align-middle">
                                        <thead>
                                            <tr>
                                                <th>Nombre</th>
                                                <th>Dirección</th>
                                                <th>Rating</th>
                                                <th>Categorías</th>
                                                <th>Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="rb : ${b.resultados}">
                                                <td><strong th:text="${rb.nombre}"></strong></td>
                                                <td th:text="${rb.direccion ?: 'Sin dirección'}"></td>

                                                <td>
                                                    <div th:if="${rb.userRating != null}">
                                                        <span class="badge bg-success">
                                                            ⭐ <span th:text="${rb.userRating}"></span>
                                                        </span>
                                                        <button class="btn btn-sm btn-outline-primary ms-2"
                                                            th:attr="onclick=|mostrarInputRating('${rb.idLugar}')|">
                                                            Editar
                                                        </button>

                                                        <div class="mt-2 d-none" th:id="'rating-box-' + ${rb.idLugar}">
                                                            <input type="number" min="0" max="5" step="0.1"
                                                                class="form-control form-control-sm mb-2"
                                                                th:id="'rating-' + ${rb.idLugar}"
                                                                th:value="${rb.userRating}">
                                                            <button class="btn btn-primary btn-sm"
                                                                th:attr="onclick=|enviarRating('${rb.idLugar}')|">
                                                                Guardar
                                                            </button>
                                                        </div>
                                                    </div>

                                                    <div th:if="${rb.userRating == null}" class="input-group input-group-sm">
                                                        <input type="number" min="0" max="5" step="0.1"
                                                            class="form-control" th:id="'rating-' + ${rb.idLugar}"
                                                            placeholder="0 - 5">
                                                        <button class="btn btn-outline-primary"
                                                            th:attr="onclick=|enviarRating('${rb.idLugar}')|">
                                                            ⭐
                                                        </button>
                                                    </div>
                                                </td>

                                                <td>
                                                    <span th:if="${rb.categorias != null}"
                                                        th:text="${#strings.listJoin(rb.categorias, ', ')}">
                                                    </span>
                                                </td>

                                                <td>
                                                    <button class="btn btn-sm btn-outline-warning"
                                                        th:attr="onclick=|addFavorito('${rb.idLugar}', '${rb.nombre}', '${rb.direccion}')|">
                                                        <i class="bi bi-star"></i> Favorito
                                                    </button>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>

                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function mostrarInputRating(idLugar) {
            document.getElementById(`rating-box-${idLugar}`).classList.remove("d-none");
        }

        async function enviarRating(idLugar) {
            const input = document.getElementById(`rating-${idLugar}`);
            const rating = parseFloat(input.value);

            // 🛡️ CORRECCIÓN CLAVE: 'isNaN' en vez de '!rating' para que el número 0 sea una entrada válida
            if (isNaN(rating) || rating < 0 || rating > 5) {
                alert("Por favor, introduce un rating válido entre 0 y 5");
                return;
            }

            const formData = new URLSearchParams();
            formData.append("idLugar", idLugar);
            formData.append("rating", rating);

            try {
                const response = await fetch("/rating/guardar", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: formData
                });

                // Control interceptor de sesión cerrada/caducada
                if (response.status === 401 || response.redirected) {
                    alert("Su sesión ha expirado. Por favor, vuelva a iniciar sesión.");
                    window.location.href = "/login";
                    return;
                }

                const data = await response.text();
                if (data === "OK") {
                    location.reload();
                } else {
                    alert("Error guardando rating");
                }

            } catch (e) {
                alert("Error de red");
            }
        }

        function addFavorito(idLugar, nombre, direccion) {
            fetch('/favoritos/agregar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    idLugar: idLugar,
                    nombre: nombre,
                    direccion: direccion || ''
                })
            })
            .then(res => {
                if (res.status === 401 || res.redirected) {
                    alert("Su sesión ha expirado. Por favor, vuelva a iniciar sesión.");
                    window.location.href = "/login";
                    return;
                }
                return res.text();
            })
            .then(data => {
                if (!data) return;
                if (data === 'OK') {
                    alert('Añadido a favoritos');
                } else if (data === 'YA_EXISTE') {
                    alert('Ya está en favoritos');
                } else {
                    alert('Error al añadir');
                }
            })
            .catch(() => {
                alert('Error de red');
            });
        }

        async function borrarHistorial() {
            if (!confirm("¿Seguro que quieres borrar TODO el historial? Esta acción no se puede deshacer.")) {
                return;
            }

            try {
                const response = await fetch("/history/clear", {
                    method: "POST"
                });

                if (response.status === 401 || response.redirected) {
                    alert("Su sesión ha expirado. Por favor, vuelva a iniciar sesión.");
                    window.location.href = "/login";
                    return;
                }

                const data = await response.text();
                if (data === "OK") {
                    location.reload();
                } else {
                    alert("Error al borrar historial");
                }

            } catch (e) {
                alert("Error de red");
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Historial de búsquedas</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

    <div class="container-fluid">

        <div class="row min-vh-100">

            <!-- SIDEBAR -->

            <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

                <h3 class="fw-bold mb-4">

                    <i class="bi bi-geo-alt-fill text-primary"></i>
                    GeoDashboard

                </h3>

                <div class="mb-4">

                    <small class="text-secondary">
                        Usuario conectado
                    </small>

                    <h5 class="mt-2">

                        <i class="bi bi-person-circle"></i>
                        <span th:text="${username}"></span>

                    </h5>

                </div>

                <hr class="border-secondary">

                <!-- MENU -->

                <div class="d-grid gap-2">

                    <a href="/home" class="btn btn-outline-light text-start">

                        <i class="bi bi-house-door"></i>
                        Inicio

                    </a>

                    <a href="/history" class="btn btn-primary text-start">

                        <i class="bi bi-clock-history"></i>
                        Historial

                    </a>

                    <a href="/settings" class="btn btn-outline-light text-start">

                        <i class="bi bi-gear"></i>
                        Configuración

                    </a>

                    <a href="/logout" class="btn btn-danger text-start mt-4">

                        <i class="bi bi-box-arrow-right"></i>
                        Cerrar sesión

                    </a>

                </div>

            </div>

            <!-- MAIN CONTENT -->

            <div class="col-md-9 col-lg-10 p-5">

                <!-- HEADER -->

                <div class="mb-4">

                    <h1 class="fw-bold mb-1">

                        <i class="bi bi-clock-history"></i>
                        Historial de búsquedas

                    </h1>

                    <p class="text-muted mb-0">

                        Últimas búsquedas realizadas

                    </p>

                </div>

                <!-- TABLE CARD -->

                <div class="card shadow-sm border-0 rounded-4">

                    <div class="card-body p-0">

                        <div class="table-responsive">

                            <table class="table table-hover align-middle mb-0">

                                <thead class="table-dark">

                                    <tr>

                                        <th>

                                            <i class="bi bi-calendar-event"></i>
                                            Fecha

                                        </th>

                                        <th>

                                            <i class="bi bi-search"></i>
                                            Búsqueda

                                        </th>

                                        <th>

                                            <i class="bi bi-geo-alt"></i>
                                            Latitud

                                        </th>

                                        <th>

                                            <i class="bi bi-geo"></i>
                                            Longitud

                                        </th>

                                    </tr>

                                </thead>

                                <tbody>

                                    <tr th:if="${#lists.isEmpty(historial)}">

                                        <td colspan="4" class="text-center py-5">

                                            <div class="text-muted">

                                                <i class="bi bi-inbox display-5"></i>

                                                <p class="mt-3 mb-0">

                                                    No hay búsquedas todavía

                                                </p>

                                            </div>

                                        </td>

                                    </tr>

                                    <tr th:each="b : ${historial}">

                                        <td>

                                            <span class="badge bg-secondary fs-6"
                                                th:text="${#temporals.format(b.fechaBusqueda, 'dd/MM/yyyy HH:mm')}">
                                            </span>

                                        </td>

                                        <td>

                                            <div class="fw-semibold" th:text="${b.query}">
                                            </div>

                                        </td>

                                        <td>

                                            <span class="text-muted" th:text="${b.latitud}">
                                            </span>

                                        </td>

                                        <td>

                                            <span class="text-muted" th:text="${b.longitud}">
                                            </span>

                                        </td>

                                    </tr>

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>

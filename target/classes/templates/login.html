<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-md-5">

            <div class="card shadow-sm border-0 rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="bi bi-lock-fill display-4 text-primary"></i>

                        <h3 class="mt-2">Iniciar sesión</h3>

                        <p class="text-muted">Acceso al sistema</p>

                    </div>

                    <!-- ERROR -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        Usuario o contraseña incorrectos
                    </div>

                    <!-- LOGOUT -->
                    <div th:if="${param.logout}" class="alert alert-success">
                        Has cerrado sesión correctamente
                    </div>

                    <form method="post" action="/login">

                        <div class="mb-3">

                            <label class="form-label">Usuario</label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   placeholder="Usuario"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Contraseña</label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Contraseña"
                                   required>

                        </div>

                        <button class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right"></i>
                            Entrar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configuración Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light">

<div class="container-fluid">

    <div class="row min-vh-100">

        <!-- SIDEBAR -->
        <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

            <h4 class="fw-bold mb-4">
                <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="32" class="me-2">
                Admin Panel
            </h4>

            <div class="mb-4">
                <small class="text-secondary">Usuario conectado</small>

                <h5 class="mt-2">
                    <i class="bi bi-person-circle"></i>
                    <span th:text="${#strings.capitalize(username)}"></span>
                </h5>
            </div>

            <hr class="border-secondary">

            <!-- MENU -->
            <div class="d-grid gap-2">

                <a href="/admin/dashboard" class="btn btn-outline-light text-start">
                    <i class="bi bi-speedometer2"></i>
                    Dashboard
                </a>

                <a href="/admin/users/create" class="btn btn-outline-light text-start">
                    <i class="bi bi-person-plus"></i>
                    Alta usuario
                </a>

                <a href="/admin/users" class="btn btn-outline-light text-start">
                    <i class="bi bi-clock-history"></i>
                    Gestionar usuarios
                </a>

                <!-- ACTIVO -->
                <a href="/admin/settings" class="btn btn-primary text-start">
                    <i class="bi bi-gear"></i>
                    Configuración
                </a>

                <a href="/logout" class="btn btn-danger text-start mt-4">
                    <i class="bi bi-box-arrow-right"></i>
                    Cerrar sesión
                </a>

            </div>

        </div>

        <!-- CONTENT -->
        <div class="col-md-9 col-lg-10 p-5">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>
                    <h1 class="fw-bold">
                        <i class="bi bi-gear"></i>
                        Configuración del admin
                    </h1>

                    <p class="text-muted mb-0">
                        Actualiza tu perfil de administrador
                    </p>
                </div>

            </div>

            <!-- FORM -->
            <div class="card shadow-sm border-0 rounded-4">

                <div class="card-body p-4">

                    <!-- Mensaje de Error por Duplicidad -->
                    <div class="alert alert-danger d-flex align-items-center mb-4" th:if="${errorUsername}">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${errorUsername}"></span>
                    </div>

                    <!-- Mensaje de Éxito -->
                    <div class="alert alert-success d-flex align-items-center mb-4" th:if="${exitoAdmin}">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <span th:text="${exitoAdmin}"></span>
                    </div>

                    <div class="alert alert-info d-flex align-items-center mb-4" th:if="${infoAdmin}">
                        <i class="bi bi-info-circle-fill me-2"></i>
                        <span th:text="${infoAdmin}"></span>
                    </div>
                    <form method="post" action="/admin/settings/update">

                        <!-- USERNAME -->
                        <div class="mb-3">

                            <label class="form-label">
                                Nombre de usuario
                            </label>

                            <input type="text"
                                   class="form-control"
                                   name="username"
                                   th:value="${admin.username}"
                                   th:classappend="${errorUsername} ? 'is-invalid' : ''"
                                   required>
                            
                            <!-- Feedback rojo de Bootstrap si el campo falla -->
                            <div class="invalid-feedback" th:if="${errorUsername}" th:text="${errorUsername}"></div>

                        </div>

                        <!-- PASSWORD -->
                        <div class="mb-3">

                            <label class="form-label">
                                Nueva contraseña
                            </label>

                            <input type="password"
                                   class="form-control"
                                   name="password"
                                   placeholder="Dejar vacío si no cambia">

                        </div>

                        <!-- INFO -->
                        <div class="alert alert-warning">
                            ⚠️ Si cambias la contraseña tendrás que volver a iniciar sesión
                        </div>

                        <!-- BUTTON -->
                        <button class="btn btn-primary">

                            <i class="bi bi-check-circle"></i>
                            Guardar cambios

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>

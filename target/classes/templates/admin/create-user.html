<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear Usuario - SeniaMaps</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light">

    <!-- NAVBAR MÓVIL -->
    <nav class="navbar navbar-expand-md bg-white border-bottom d-md-none">
        <div class="container-fluid">

            <a class="navbar-brand fw-bold text-success d-flex align-items-center" href="#">
                <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}"
                     alt="Logo"
                     height="32"
                     class="me-2">

                SeniaMaps
            </a>

            <button class="navbar-toggler border-0 shadow-none"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#sidebarMenu">

                <span class="navbar-toggler-icon"></span>

            </button>

        </div>
    </nav>

    <div class="container-fluid">

        <div class="row min-vh-100">

            <!-- SIDEBAR -->
            <aside class="col-md-3 col-lg-2 collapse d-md-block bg-white border-end"
                   id="sidebarMenu">

                <div class="p-4 d-flex flex-column h-100">

                    <!-- LOGO -->
                    <div class="mb-4 d-none d-md-flex align-items-center">

                        <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}"
                             alt="Logo"
                             height="40"
                             class="me-2">

                        <h4 class="fw-bold text-success mb-0">
                            SeniaMaps
                        </h4>

                    </div>

                    <!-- USER -->
                    <div class="card border-0 bg-light mb-4">

                        <div class="card-body">

                            <small class="text-muted">
                                Usuario conectado
                            </small>

                            <h6 class="fw-bold mt-2 mb-0 text-truncate">

                                <i class="bi bi-person-circle text-success me-2"></i>

                                <span th:text="${#strings.capitalize(username)}"></span>

                            </h6>

                        </div>

                    </div>

                    <!-- MENU -->
                    <div class="nav nav-pills flex-column gap-2">

                        <a href="/admin/dashboard"
                           class="nav-link text-dark">

                            <i class="bi bi-speedometer2 me-2 text-success"></i>
                            Dashboard

                        </a>

                        <a href="/admin/users/create"
                           class="nav-link active bg-success text-white">

                            <i class="bi bi-person-plus me-2"></i>
                            Alta usuario

                        </a>

                        <a href="/admin/users"
                           class="nav-link text-dark">

                            <i class="bi bi-people me-2 text-success"></i>
                            Gestionar usuarios

                        </a>

                        <a href="/admin/settings"
                           class="nav-link text-dark">

                            <i class="bi bi-gear me-2 text-success"></i>
                            Configuración

                        </a>

                    </div>

                    <!-- LOGOUT -->
                    <div class="mt-auto pt-4">

                        <a href="/logout"
                           class="btn btn-danger w-100">

                            <i class="bi bi-box-arrow-right me-2"></i>
                            Cerrar sesión

                        </a>

                    </div>

                </div>

            </aside>

            <!-- MAIN CONTENT -->
            <main class="col-md-9 col-lg-10 p-4 p-lg-5">

                <!-- HEADER -->
                <div class="mb-5">

                    <h1 class="fw-bold mb-1">
                        Crear usuario
                    </h1>

                    <p class="text-muted mb-0">
                        Añade nuevos usuarios al sistema SeniaMaps
                    </p>

                </div>

                <!-- FORM CARD -->
                <div class="card border-0 shadow-sm">

                    <div class="card-body p-4 p-lg-5">

                        <form method="post" action="/admin/users/create">

                            <!-- ERROR -->
                            <div class="alert alert-danger"
                                 th:if="${errorGeneral}"
                                 th:text="${errorGeneral}">
                            </div>

                            <!-- USERNAME -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Username
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-person"></i>
                                    </span>

                                    <input class="form-control"
                                           name="username"
                                           placeholder="Introduce username"
                                           th:value="${username}"
                                           th:classappend="${errorUsername} ? 'is-invalid' : ''"
                                           required>

                                    <div class="invalid-feedback"
                                         th:if="${errorUsername}"
                                         th:text="${errorUsername}">
                                    </div>

                                </div>

                            </div>

                            <!-- EMAIL -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Email
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-envelope"></i>
                                    </span>

                                    <input class="form-control"
                                           type="email"
                                           name="email"
                                           placeholder="Introduce email"
                                           th:value="${email}"
                                           th:classappend="${errorEmail} ? 'is-invalid' : ''"
                                           required>

                                    <div class="invalid-feedback"
                                         th:if="${errorEmail}"
                                         th:text="${errorEmail}">
                                    </div>

                                </div>

                            </div>

                            <!-- PASSWORD -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Password
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-lock"></i>
                                    </span>

                                    <input class="form-control"
                                           type="password"
                                           name="password"
                                           placeholder="Introduce password"
                                           required>

                                </div>

                            </div>

                            <!-- ROL -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Rol
                                </label>

                                <select class="form-select"
                                        name="rol">

                                    <option value="ROLE_USER"
                                            th:selected="${rol == 'ROLE_USER'}">

                                        USER

                                    </option>

                                    <option value="ROLE_ADMIN"
                                            th:selected="${rol == 'ROLE_ADMIN'}">

                                        ADMIN

                                    </option>

                                </select>

                            </div>

                            <!-- BUTTON -->
                            <button class="btn btn-success w-100 py-2">

                                <i class="bi bi-person-check me-2"></i>
                                Crear usuario

                            </button>

                        </form>

                    </div>

                </div>

            </main>

        </div>

    </div>

    <!-- TOAST -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">

        <div class="toast align-items-center text-bg-success border-0"
             role="alert"
             aria-live="assertive"
             aria-atomic="true">

            <div class="d-flex">

                <div class="toast-body">
                    Usuario creado correctamente
                </div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>

    <!-- SPINNER -->
    <div class="d-none position-fixed top-50 start-50 translate-middle"
         id="loadingSpinner"
         style="z-index: 9999;">

        <div class="spinner-border text-success"
             role="status">

            <span class="visually-hidden">
                Loading...
            </span>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

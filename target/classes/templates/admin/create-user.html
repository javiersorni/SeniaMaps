<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light">

    <div class="container-fluid">

        <div class="row min-vh-100">
            <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

                <h3 class="fw-bold mb-4">
                    <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="32" class="me-2">
                    Admin Panel
                </h3>

                <div class="mb-4">

                    <small class="text-secondary">
                        Usuario conectado
                    </small>

                    <h5 class="mt-2">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${#strings.capitalize(username)}"></span>
                    </h5>

                </div>

                <hr class="border-secondary">

                <!-- MENU -->
                <div class="d-grid gap-2">

                    <a href="/admin/dashboard" class="btn btn-outline-light text-start">
                        <i class="bi bi-speedometer2"></i>
                        Dashboard
                    </a>

                    <a href="/admin/users/create" class="btn btn-primary text-start">
                        <i class="bi bi-person-plus"></i>
                        Alta usuario
                    </a>

                    <a href="/admin/users" class="btn btn-outline-light text-start">
                        <i class="bi bi-clock-history"></i>
                        Gestionar usuarios
                    </a>

                    <a href="/admin/settings" class="btn btn-outline-light text-start">
                        <i class="bi bi-gear"></i>
                        Configuración
                    </a>

                    <a href="/logout" class="btn btn-danger text-start mt-4">
                        <i class="bi bi-box-arrow-right"></i>
                        Cerrar sesión
                    </a>

                </div>

            </div>

            <!-- MAIN CONTENT -->
            <div class="col-md-9 col-lg-10 p-5">

                <div class="mb-4">

                    <h1 class="fw-bold">
                        Crear usuario
                    </h1>

                    <p class="text-muted">
                        Añade nuevos usuarios al sistema
                    </p>

                </div>

                <!-- CARD -->
                <div class="card shadow-sm border-0 rounded-4">

                    <div class="card-body p-4">
                        <form method="post" action="/admin/users/create">

                            <div class="alert alert-danger" th:if="${errorGeneral}" th:text="${errorGeneral}"></div>

                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input class="form-control" name="username" placeholder="Introduce username" 
                                    th:value="${username}"
                                    th:classappend="${errorUsername} ? 'is-invalid' : ''" required>
                                <div class="invalid-feedback" th:if="${errorUsername}" th:text="${errorUsername}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input class="form-control" type="email" name="email" placeholder="Introduce email" 
                                    th:value="${email}"
                                    th:classappend="${errorEmail} ? 'is-invalid' : ''" required>
                                <div class="invalid-feedback" th:if="${errorEmail}" th:text="${errorEmail}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input class="form-control" type="password" name="password" placeholder="Introduce password" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Rol</label>
                                <select class="form-select" name="rol">
                                    <option value="ROLE_USER" th:selected="${rol == 'ROLE_USER'}">USER</option>
                                    <option value="ROLE_ADMIN" th:selected="${rol == 'ROLE_ADMIN'}">ADMIN</option>
                                </select>
                            </div>

                            <button class="btn btn-success w-100">
                                <i class="bi bi-person-check"></i> Crear usuario
                            </button>
                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>

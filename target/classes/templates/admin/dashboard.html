<!-- templates/admin/dashboard.html -->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="bg-dark text-white p-3 vh-100" style="width:260px;">

        <h4 class="mb-4">
            <i class="bi bi-shield-lock"></i> Admin
        </h4>

        <a href="/admin/dashboard" class="d-block text-white mb-3 text-decoration-none">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="/admin/users/create" class="d-block text-white mb-3 text-decoration-none">
            <i class="bi bi-person-plus"></i> Alta usuario
        </a>

        <a href="/admin/users/history" class="d-block text-white mb-3 text-decoration-none">
            <i class="bi bi-clock-history"></i> Historial usuarios
        </a>

        <a href="/admin/settings" class="d-block text-white mb-3 text-decoration-none">
            <i class="bi bi-gear"></i> Configuración
        </a>

        <hr class="text-white">

        <a href="/logout" class="btn btn-danger w-100">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </div>

    <!-- CONTENT -->
    <div class="p-4 flex-grow-1">

        <h1 class="mb-4">Panel de administración</h1>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Usuarios</h5>
                        <p class="text-muted">Gestión de usuarios del sistema</p>
                        <a href="/admin/users/create" class="btn btn-primary btn-sm">Crear</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Historial</h5>
                        <p class="text-muted">Actividad de usuarios</p>
                        <a href="/admin/users/history" class="btn btn-primary btn-sm">Ver</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Configuración</h5>
                        <p class="text-muted">Ajustes del sistema</p>
                        <a href="/admin/settings" class="btn btn-primary btn-sm">Abrir</a>
                    </div>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historial - SeniaMaps</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row min-vh-100">

            <!-- SIDEBAR -->
            <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

                <h3 class="fw-bold mb-4">
                    <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="32" class="me-2">
                    SeniaMaps
                </h3>

                <div class="mb-4">
                    <small class="text-secondary">Usuario conectado</small>
                    <h5 class="mt-2">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${#strings.capitalize(username)}"></span>
                    </h5>
                </div>

                <hr class="border-secondary">

                <div class="d-grid gap-2">

                    <a href="/home" class="btn btn-outline-light text-start">
                        <i class="bi bi-house-door"></i> Inicio
                    </a>

                    <a href="/history" class="btn btn-primary text-start">
                        <i class="bi bi-clock-history"></i> Historial
                    </a>

                    <a href="/favoritos" class="btn btn-outline-light text-start">
                        <i class="bi bi-star"></i> Mis Favoritos
                    </a>
                    <a href="/etiquetas" class="btn btn-outline-light text-start">
                        <i class="bi bi-tags-fill"></i> Gestionar Etiquetas
                    </a>
                    <a href="/settings" class="btn btn-outline-light text-start">
                        <i class="bi bi-gear"></i> Configuración
                    </a>

                    <a href="/logout" class="btn btn-danger text-start mt-4">
                        <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                    </a>

                </div>
            </div>

            <!-- MAIN -->
            <div class="col-md-9 col-lg-10 p-5">

                <h1 class="fw-bold mb-4">Historial de Búsquedas</h1>

                <!-- VACÍO -->
                <div th:if="${#lists.isEmpty(historial)}" class="card p-5 text-center shadow-sm">
                    <i class="bi bi-inbox fs-1 text-muted"></i>
                    <p class="mt-3 mb-0">No hay búsquedas todavía</p>
                </div>

                <!-- LISTA -->
                <div th:if="${!#lists.isEmpty(historial)}">

                    <div class="accordion" id="accordionHistorial">

                        <div class="accordion-item" th:each="b : ${historial}">

                            <h2 class="accordion-header" th:id="'h-' + ${b.idBusqueda}">

                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                    th:data-bs-target="'#c-' + ${b.idBusqueda}">

                                    <strong th:text="${b.query}"></strong>

                                    <span class="ms-3 text-muted small">
                                        (<span th:text="${b.latitud}"></span>,
                                        <span th:text="${b.longitud}"></span>)
                                    </span>

                                    <span class="ms-auto badge bg-primary"
                                        th:text="${#lists.size(b.resultados)} + ' resultados'">
                                    </span>

                                </button>

                            </h2>

                            <div class="accordion-collapse collapse" th:id="'c-' + ${b.idBusqueda}">

                                <div class="accordion-body">

                                    <!-- SIN RESULTADOS -->
                                    <div th:if="${#lists.isEmpty(b.resultados)}" class="text-muted text-center">
                                        Sin resultados
                                    </div>

                                    <!-- TABLA -->
                                    <table th:if="${!#lists.isEmpty(b.resultados)}" class="table table-hover">

                                        <thead>
                                            <tr>
                                                <th>Nombre</th>
                                                <th>Dirección</th>
                                                <th>Rating</th>
                                                <th>Categorías</th>
                                                <th></th>
                                            </tr>
                                        </thead>

                                        <tbody>

                                            <tr th:each="rb : ${b.resultados}">

                                                <!-- NOMBRE -->
                                                <td>
                                                    <strong th:text="${rb.nombre}"></strong>
                                                </td>

                                                <!-- DIRECCIÓN -->
                                                <td th:text="${rb.direccion ?: 'Sin dirección'}"></td>

                                                <!-- RATING -->
                                                <td th:text="${rb.rating ?: 'Sin rating'}"></td>

                                                <!-- CATEGORÍAS -->
                                                <td>
                                                    <span th:if="${rb.categorias != null}"
                                                        th:text="${#strings.listJoin(rb.categorias, ', ')}">
                                                    </span>
                                                </td>

                                                <!-- ACCIÓN -->
                                                <td>
                                                    <button class="btn btn-sm btn-outline-warning"
                                                        th:attr="onclick=|addFavorito('${rb.idLugar}', '${rb.nombre}', '${rb.direccion}', ${rb.rating})|">
                                                        <i class="bi bi-star"></i> Favorito
                                                    </button>
                                                </td>

                                            </tr>

                                        </tbody>

                                    </table>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function addFavorito(idLugar, nombre, direccion, rating) {

            fetch('/favoritos/agregar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    idLugar: idLugar,
                    nombre: nombre,
                    direccion: direccion || '',
                    rating: rating || ''
                })
            })
                .then(res => res.text())
                .then(data => {

                    if (data === 'OK') {
                        alert('Añadido a favoritos');
                    } else if (data === 'YA_EXISTE') {
                        alert('Ya está en favoritos');
                    } else {
                        alert('Error al añadir');
                    }

                })
                .catch(() => alert('Error de red'));
        }
    </script>
</body>

</html>

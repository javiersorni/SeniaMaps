<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historial - SeniaMaps</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Just Sans (fuente principal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<!-- Tema claro, tipografía Just Sans (fallback Inter / system) -->

<!-- Tema claro, tipografía Just Sans (fallback Inter / system) -->

<body class="bg-light text-dark"
    style="font-family: 'Just Sans','Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">

    <!-- ===== NAVBAR MÓVIL (hamburguesa) ===== -->
    <nav class="navbar navbar-light bg-white border-bottom d-md-none sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center text-primary fw-semibold" href="#">
                <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="28"
                    class="me-2">
                SeniaMaps
            </a>
            <button class="btn btn-outline-primary" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMobile">
                <i class="bi bi-list fs-4"></i>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="sidebarMobile">

        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title text-primary fw-semibold">SeniaMaps</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body p-0">
            <div th:replace="fragments/sidebar :: sidebar('history')"></div>
        </div>

    </div>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <!-- ===== SIDEBAR FIJA (desktop) ===== -->
            <aside
                class="col-md-3 col-lg-2 d-none d-md-flex flex-column bg-white border-end shadow-sm p-0 vh-100 position-sticky top-0">

                <div th:replace="~{fragments/sidebar :: sidebar('history')}"></div>

            </aside>

            <div class="col-md-9 col-lg-10 p-4 p-lg-5">

                <!-- PAGE HEADER -->
                <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-5">

                    <div>

                        <h1 class="fw-bold mb-1">
                            Historial de búsquedas
                        </h1>

                        <p class="text-muted mb-0">
                            Consulta tus búsquedas recientes y guarda lugares favoritos.
                        </p>

                    </div>

                    <button class="btn btn-outline-danger rounded-3 shadow-none d-flex align-items-center gap-2"
                        onclick="borrarHistorial()">

                        <i class="bi bi-trash"></i>
                        Borrar historial

                    </button>

                </div>

                <!-- EMPTY STATE -->
                <div th:if="${#lists.isEmpty(historial)}" class="card border-0 shadow-sm rounded-4 text-center p-5">

                    <div class="card-body py-5">

                        <div class="mb-4">

                            <i class="bi bi-inbox text-muted" style="font-size: 4rem;"></i>

                        </div>

                        <h4 class="fw-semibold mb-2">
                            No hay búsquedas todavía
                        </h4>

                        <p class="text-muted mb-0">
                            Tus búsquedas aparecerán aquí automáticamente.
                        </p>

                    </div>

                </div>

                <!-- HISTORIAL -->
                <div th:if="${!#lists.isEmpty(historial)}">

                    <div class="accordion" id="accordionHistorial">

                        <div class="accordion-item border-0 shadow-sm rounded-4 overflow-hidden mb-4"
                            th:each="b : ${historial}">

                            <!-- HEADER -->
                            <h2 class="accordion-header" th:id="'h-' + ${b.idBusqueda}">

                                <button class="accordion-button collapsed shadow-none py-4 px-4" type="button"
                                    data-bs-toggle="collapse" th:data-bs-target="'#c-' + ${b.idBusqueda}">

                                    <div class="w-100">

                                        <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-3">

                                            <div>

                                                <div class="fw-semibold fs-5" th:text="${b.query}">
                                                </div>

                                                <div class="text-muted small mt-1 d-flex align-items-center gap-2">

                                                    <i class="bi bi-geo-alt"></i>

                                                    <span>
                                                        <span th:text="${b.latitud}"></span>,
                                                        <span th:text="${b.longitud}"></span>
                                                    </span>

                                                </div>

                                            </div>

                                            <div class="ms-lg-auto">

                                                <span
                                                    class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2"
                                                    th:text="${#lists.size(b.resultados)} + ' resultados'">
                                                </span>

                                            </div>

                                        </div>

                                    </div>

                                </button>

                            </h2>

                            <!-- BODY -->
                            <div class="accordion-collapse collapse" th:id="'c-' + ${b.idBusqueda}">

                                <div class="accordion-body p-4">

                                    <!-- SIN RESULTADOS -->
                                    <div th:if="${#lists.isEmpty(b.resultados)}" class="text-center py-5">

                                        <i class="bi bi-search text-muted fs-1 mb-3 d-block"></i>

                                        <p class="text-muted mb-0">
                                            No se encontraron resultados
                                        </p>

                                    </div>

                                    <!-- RESULTADOS -->
                                    <div th:if="${!#lists.isEmpty(b.resultados)}" class="row g-4">

                                        <div class="col-12 col-md-6 col-xl-4" th:each="rb : ${b.resultados}">

                                            <div class="card border-0 shadow-sm rounded-4 h-100">

                                                <div class="card-body p-4 d-flex flex-column">

                                                    <!-- TOP -->
                                                    <div class="d-flex align-items-start justify-content-between mb-3">

                                                        <div>

                                                            <h5 class="fw-semibold mb-1" th:text="${rb.nombre}">
                                                            </h5>

                                                            <p class="text-muted small mb-0">

                                                                <i class="bi bi-geo-alt"></i>

                                                                <span th:text="${rb.direccion ?: 'Sin dirección'}">
                                                                </span>

                                                            </p>

                                                        </div>

                                                        <span th:if="${rb.enFavorito}"
                                                            class="badge bg-success-subtle text-success rounded-pill px-3 py-2">

                                                            <i class="bi bi-star-fill"></i>

                                                        </span>

                                                    </div>

                                                    <!-- CATEGORÍAS -->
                                                    <div class="mb-4">

                                                        <label class="form-label small text-muted mb-2">
                                                            Categorías
                                                        </label>

                                                        <div class="d-flex flex-wrap gap-2">

                                                            <span th:if="${rb.categorias != null}"
                                                                th:each="cat : ${rb.categorias}"
                                                                class="badge text-bg-light border rounded-pill px-3 py-2">

                                                                <span th:text="${cat}"></span>

                                                            </span>

                                                            <span th:if="${rb.categorias == null}"
                                                                class="badge text-bg-light border rounded-pill px-3 py-2">

                                                                General

                                                            </span>

                                                        </div>

                                                    </div>

                                                    <!-- Rating -->
                                                    <div class="mb-4 rating-component" th:attr="data-id=${rb.idLugar}">

                                                        <label class="form-label small text-muted mb-2">
                                                            Tu valoración
                                                        </label>

                                                        <!-- VIEW -->
                                                        <div class="rating-view" th:if="${rb.userRating != null}">
                                                            <div class="d-flex align-items-center gap-2 mb-3">

                                                                <span
                                                                    class="badge bg-warning-subtle text-warning rounded-pill px-3 py-2">
                                                                    <i class="bi bi-star-fill"></i>
                                                                    <span class="rating-value"
                                                                        th:text="${rb.userRating}"></span>
                                                                </span>

                                                                <button
                                                                    class="btn btn-sm btn-outline-primary js-edit-rating rounded-3">
                                                                    Editar
                                                                </button>

                                                            </div>
                                                        </div>

                                                        <!-- EDIT (SIEMPRE EXISTE, solo oculto si hay rating) -->
                                                        <div class="rating-edit"
                                                            th:classappend="${rb.userRating != null} ? ' d-none' : ''">

                                                            <div class="input-group">

                                                                <input type="number" min="0" max="5" step="0.1"
                                                                    class="form-control rating-input shadow-none rounded-start-3"
                                                                    th:value="${rb.userRating}">

                                                                <button
                                                                    class="btn btn-primary js-save-rating rounded-end-3 shadow-none">
                                                                    Guardar
                                                                </button>

                                                            </div>

                                                        </div>

                                                    </div>

                                                    <!-- ACTIONS -->
                                                    <div class="mt-auto">

                                                        <div th:if="${rb.enFavorito}">

                                                            <div
                                                                class="badge bg-success-subtle text-success rounded-pill px-3 py-2 d-inline-flex align-items-center gap-2">

                                                                <i class="bi bi-check-circle-fill"></i>
                                                                En favoritos

                                                            </div>

                                                        </div>

                                                        <div th:if="${!rb.enFavorito}">

                                                            <button class="btn btn-outline-warning js-fav"
                                                                th:attr="data-id=${rb.idLugar}, data-nombre=${rb.nombre}, data-direccion=${rb.direccion}">
                                                                Añadir
                                                            </button>

                                                        </div>

                                                    </div>

                                                </div>

                                            </div>

                                        </div>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- TOAST -->
            <div class="position-fixed bottom-0 end-0 p-4" style="z-index: 1080">

                <div id="appToast" class="toast border-0 shadow-sm rounded-4" style="pointer-events:none" role="alert">

                    <div class="toast-body d-flex align-items-center gap-2">

                        <i class="bi bi-info-circle text-primary"></i>

                        <span id="toastMessage"></span>

                    </div>

                </div>

            </div>
            <!-- MODAL CONFIRMACIÓN -->
            <div class="modal fade" id="confirmModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content rounded-3 border-0 shadow">
                        <div class="modal-header">
                            <h5 class="modal-title text-primary">
                                <i class="bi bi-question-circle me-2"></i>Confirmar
                            </h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body" id="confirmModalBody">
                            ¿Continuar con la acción?
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary shadow-none" data-bs-dismiss="modal">
                                Cancelar
                            </button>
                            <button type="button" class="btn btn-primary shadow-none" id="confirmModalOk">
                                Confirmar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

            <script>
                console.log("HISTORIAL JS CARGADO");

                const toastEl = document.getElementById('appToast');
                const toast = new bootstrap.Toast(toastEl, {
                    delay: 2500
                });

                function showToast(message, type = "info") {

                    const iconMap = {
                        success: "bi-check-circle-fill text-success",
                        error: "bi-x-circle-fill text-danger",
                        info: "bi-info-circle text-primary",
                        warning: "bi-exclamation-triangle-fill text-warning"
                    };

                    const iconClass = iconMap[type] || iconMap.info;

                    document.getElementById('toastMessage').innerHTML = `
            <i class="bi ${iconClass} me-2"></i>
            ${message}
        `;

                    toast.show();
                }

                function confirmAction(message, onConfirm) {
                    const body = document.getElementById('confirmModalBody');
                    const modalEl = document.getElementById('confirmModal');
                    const okBtn = document.getElementById('confirmModalOk');

                    if (!body || !modalEl || !okBtn) return;

                    body.textContent = message;

                    const modal = bootstrap.Modal.getOrCreateInstance(modalEl);

                    const handler = () => {
                        okBtn.removeEventListener('click', handler);
                        modal.hide();
                        onConfirm();
                    };

                    okBtn.addEventListener('click', handler);
                    modal.show();
                }

                document.addEventListener("click", async (e) => {

                    const btn = e.target.closest(".js-fav");
                    const btnEdit = e.target.closest(".js-edit-rating");
                    const btnSave = e.target.closest(".js-save-rating");

                    const comp = e.target.closest(".rating-component");

                    /* =========================
                       FAVORITOS
                    ==========================*/
                    if (btn) {
                        addFavorito(
                            btn.dataset.id,
                            btn.dataset.nombre,
                            btn.dataset.direccion
                        );
                        return; // solo este return (no rompe el resto)
                    }

                    /* =========================
                       RATING (solo si estamos en componente)
                    ==========================*/
                    if (!comp) return;

                    const idLugar = comp.dataset.id;

                    // EDITAR
                    if (btnEdit) {
                        comp.querySelector(".rating-view")?.classList.add("d-none");
                        comp.querySelector(".rating-edit")?.classList.remove("d-none");
                        return;
                    }

                    // GUARDAR
                    if (btnSave) {

                        const input = comp.querySelector(".rating-input");
                        const rating = parseFloat(input.value);

                        if (isNaN(rating) || rating < 0 || rating > 5) {
                            showToast("Introduce un rating válido entre 0 y 5");
                            return;
                        }

                        const formData = new URLSearchParams();
                        formData.append("idLugar", idLugar);
                        formData.append("rating", rating);

                        try {
                            const response = await fetch("/rating/guardar", {
                                method: "POST",
                                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                                body: formData
                            });

                            if (response.status === 401 || response.redirected) {
                                window.location.href = "/login";
                                return;
                            }

                            const data = await response.text();

                            if (data === "OK") {

                                showToast("Rating guardado", "success");

                                let view = comp.querySelector(".rating-view");

                                if (!view) {
                                    view = document.createElement("div");
                                    view.className = "rating-view";
                                    comp.prepend(view);
                                }

                                view.innerHTML = `
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <span class="badge bg-warning-subtle text-warning rounded-pill px-3 py-2">
                                <i class="bi bi-star-fill"></i>
                                <span class="rating-value">${rating}</span>
                            </span>

                            <button class="btn btn-sm btn-outline-primary js-edit-rating rounded-3">
                                Editar
                            </button>
                        </div>
                    `;

                                view.classList.remove("d-none");
                                comp.querySelector(".rating-edit")?.classList.add("d-none");

                            } else {
                                showToast("Error guardando rating", "error");
                            }

                        } catch (err) {
                            showToast("Error de red", "error");
                        }
                    }
                });

                function addFavorito(idLugar, nombre, direccion) {

                    confirmAction(`¿Añadir "${nombre}" a favoritos?`, async () => {

                        try {

                            const response = await fetch('/favoritos/agregar', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/x-www-form-urlencoded'
                                },
                                body: new URLSearchParams({
                                    idLugar,
                                    nombre,
                                    direccion: direccion || ''
                                })
                            });

                            if (response.status === 401 || response.redirected) {
                                window.location.href = "/login";
                                return;
                            }

                            const data = await response.text();

                            if (data === 'OK') {

                                showToast('Añadido a favoritos', "success");
                                actualizarFavoritoUI(idLugar);

                            } else if (data === 'YA_EXISTE') {

                                showToast('Ya está en favoritos', "warning");
                                actualizarFavoritoUI(idLugar);

                            } else {

                                showToast('Error al añadir a favoritos', "error");
                            }

                        } catch (e) {
                            showToast('Error de red', "error");
                        }
                    });
                }

                function actualizarFavoritoUI(idLugar) {

                    const button = document.querySelector(
                        `button[onclick*="addFavorito('${idLugar}'"]`
                    );

                    if (!button) return;

                    const card = button.closest(".card");
                    if (!card) return;

                    const actions = card.querySelector(".mt-auto");
                    if (!actions) return;

                    actions.innerHTML = `
            <div class="badge bg-success-subtle text-success rounded-pill px-3 py-2 d-inline-flex align-items-center gap-2">
                <i class="bi bi-check-circle-fill"></i>
                En favoritos
            </div>
        `;
                }

                function borrarHistorial() {

                    confirmAction("¿Seguro que quieres borrar TODO el historial?", async () => {

                        try {

                            const response = await fetch("/history/clear", {
                                method: "POST"
                            });

                            if (response.status === 401 || response.redirected) {
                                window.location.href = "/login";
                                return;
                            }

                            const data = await response.text();

                            if (data === "OK") {
                                showToast("Historial eliminado", "success");

                                setTimeout(() => {
                                    location.reload();
                                }, 700);
                            } else {
                                showToast("Error al borrar historial", "error");
                            }

                        } catch (e) {
                            showToast("Error de red", "error");
                        }
                    });
                }

            </script>
</body>

</html>

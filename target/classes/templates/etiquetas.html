<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Etiquetas - SeniaMaps</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Just Sans (fuente principal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light text-dark"
    style="font-family: 'Just Sans','Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">

    <!-- ===== NAVBAR MÓVIL (hamburguesa) ===== -->
    <nav class="navbar navbar-light bg-white border-bottom d-md-none sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center text-primary fw-semibold" href="#">
                <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="28"
                    class="me-2">
                SeniaMaps
            </a>
            <button class="btn btn-outline-primary" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMobile">
                <i class="bi bi-list fs-4"></i>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="sidebarMobile">

        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title text-primary fw-semibold">SeniaMaps</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body p-0">
            <div th:replace="~{fragments/sidebar :: sidebar('etiquetas')}"></div>
        </div>

    </div>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <aside
                class="col-md-3 col-lg-2 d-none d-md-flex flex-column bg-white border-end shadow-sm p-0 position-sticky top-0"
                style="height:100vh;">

                <div th:replace="fragments/sidebar :: sidebar('etiquetas')"></div>

            </aside>

            <div class="col-md-9 col-lg-10 p-4 p-lg-5">

                <!-- PAGE HEADER -->
                <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-5">

                    <div>

                        <h1 class="fw-bold mb-1">
                            Gestión de etiquetas
                        </h1>

                        <p class="text-muted mb-0">
                            Administra las etiquetas asociadas a tus sitios guardados.
                        </p>

                    </div>

                </div>

                <!-- EMPTY STATE -->
                <div th:if="${#lists.isEmpty(etiquetas)}" class="card border-0 shadow-sm rounded-4 text-center p-5">

                    <div class="card-body py-5">

                        <div class="mb-4">

                            <i class="bi bi-tags text-muted" style="font-size: 4rem;"></i>

                        </div>

                        <h4 class="fw-semibold mb-2">
                            No hay etiquetas
                        </h4>

                        <p class="text-muted mb-0">
                            No se encontraron sitios con etiquetas asociadas.
                        </p>

                    </div>

                </div>

                <!-- TABLE -->
                <div th:if="${not #lists.isEmpty(etiquetas)}" class="card border-0 shadow-sm rounded-4 overflow-hidden">

                    <div class="table-responsive">

                        <table class="table align-middle mb-0">

                            <thead class="bg-light">

                                <tr class="text-muted small">

                                    <th class="px-4 py-3">
                                        Sitio guardado
                                    </th>

                                    <th class="px-4 py-3">
                                        Etiqueta
                                    </th>

                                    <th class="text-center px-4 py-3">
                                        Acciones
                                    </th>

                                </tr>

                            </thead>

                            <tbody>

                                <tr th:each="eti : ${etiquetas}">

                                    <!-- SITIO -->
                                    <td class="px-4 py-3">

                                        <div class="fw-semibold" th:text="${eti.resultado.nombre}">
                                        </div>

                                        <div class="text-muted small">
                                            <i class="bi bi-geo-alt"></i>

                                            <span th:text="${eti.resultado.direccion ?: 'Sin dirección'}">
                                            </span>
                                        </div>

                                    </td>

                                    <!-- ETIQUETA -->
                                    <td class="px-4 py-3">

                                        <span
                                            class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2 d-inline-flex align-items-center gap-2">

                                            <i class="bi bi-tag-fill"></i>

                                            <span th:text="${eti.nombreEtiqueta}">
                                                etiqueta
                                            </span>

                                            <form method="post" action="/etiquetas/delete-etiqueta" class="m-0 p-0">

                                                <input type="hidden" name="resultadoId"
                                                    th:value="${eti.resultado.idResultado}">

                                                <input type="hidden" name="tagName" th:value="${eti.nombreEtiqueta}">

                                                <button type="submit" class="btn-close" style="font-size: .55rem;">
                                                </button>

                                            </form>

                                        </span>

                                    </td>

                                    <!-- ACTIONS -->
                                    <td class="text-center px-4 py-3">

                                        <form method="post" action="/etiquetas/delete-favorito"
                                            class="js-delete-favorito m-0">

                                            <input type="hidden" name="resultadoId"
                                                th:value="${eti.resultado.idResultado}">

                                            <button
                                                class="btn btn-outline-danger btn-sm rounded-3 d-inline-flex align-items-center gap-2">

                                                <i class="bi bi-trash"></i>
                                                Quitar

                                            </button>

                                        </form>

                                    </td>

                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
            <!-- OPTIONAL SCRIPT (UNCHANGED LOGIC) -->
            <script>
                document.addEventListener("DOMContentLoaded", function () {
                    const selectElement = document.getElementById("tagSelect");
                    if (selectElement) {
                        selectElement.addEventListener("change", function () {
                            document.getElementById("filterForm").submit();
                        });
                    }
                });
                function confirmAction(message, onConfirm) {
                    document.getElementById('confirmModalBody').textContent = message;

                    const modalEl = document.getElementById('confirmModal');
                    const modal = bootstrap.Modal.getOrCreateInstance(modalEl);

                    const okBtn = document.getElementById('confirmModalOk');

                    const handler = () => {
                        okBtn.removeEventListener('click', handler);
                        modal.hide();
                        onConfirm();
                    };

                    okBtn.addEventListener('click', handler);
                    modal.show();
                }
                document.addEventListener("submit", function (e) {

                    const form = e.target.closest(".js-delete-favorito");
                    if (!form) return;

                    e.preventDefault();

                    confirmAction("¿Seguro que quieres eliminar este favorito? Se eliminarán sus etiquetas.", () => {
                        form.submit();
                    });
                });
            </script>

            <!-- MODAL CONFIRMACIÓN -->
            <div class="modal fade" id="confirmModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content rounded-3 border-0 shadow">
                        <div class="modal-header">
                            <h5 class="modal-title text-primary">
                                <i class="bi bi-question-circle me-2"></i>Confirmar
                            </h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body" id="confirmModalBody">
                            ¿Continuar con la acción?
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary shadow-none" data-bs-dismiss="modal">
                                Cancelar
                            </button>
                            <button type="button" class="btn btn-primary shadow-none" id="confirmModalOk">
                                Confirmar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
</body>

</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configuración de usuario</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Just Sans (fuente principal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light text-dark"
    style="font-family: 'Just Sans','Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">

    <!-- ===== NAVBAR MÓVIL (hamburguesa) ===== -->
    <nav class="navbar navbar-light bg-white border-bottom d-md-none sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center text-primary fw-semibold" href="#">
                <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="28"
                    class="me-2">
                SeniaMaps
            </a>
            <button class="btn btn-outline-primary" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMobile">
                <i class="bi bi-list fs-4"></i>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="sidebarMobile">

        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title text-primary fw-semibold">SeniaMaps</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body p-0">
            <div th:replace="~{fragments/sidebar :: sidebar('settings')}"></div>
        </div>

    </div>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <aside
                class="col-md-3 col-lg-2 d-none d-md-flex flex-column bg-white border-end shadow-sm p-0 position-sticky top-0"
                style="height:100vh;">

                <div th:replace="fragments/sidebar :: sidebar('settings')"></div>

            </aside>

            <!-- MAIN CONTENT -->
            <div class="col-md-9 col-lg-10 p-4 p-lg-5">

                <!-- PAGE HEADER -->
                <div class="mb-5">

                    <h1 class="fw-bold mb-1 d-flex align-items-center gap-2">
                        <i class="bi bi-gear text-primary"></i>
                        Configuración de usuario
                    </h1>

                    <p class="text-muted mb-0">
                        Gestiona tu perfil, credenciales y preferencias de cuenta.
                    </p>

                </div>

                <!-- CARD 1: USERNAME -->
                <div class="card border-0 shadow-sm rounded-4 mb-4">

                    <div class="card-body p-4">

                        <div class="mb-4">

                            <h5 class="fw-semibold d-flex align-items-center gap-2 mb-1">
                                <i class="bi bi-person text-primary"></i>
                                Cambiar nombre de usuario
                            </h5>

                            <p class="text-muted small mb-0">
                                Actualiza tu nombre de usuario en la plataforma.
                            </p>

                        </div>

                        <!-- ALERTS -->
                        <div class="alert alert-danger border-0 shadow-sm rounded-3 d-flex align-items-center gap-2 py-2"
                            th:if="${errorUsername}">

                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <span th:text="${errorUsername}"></span>

                        </div>

                        <div class="alert alert-success border-0 shadow-sm rounded-3 d-flex align-items-center gap-2 py-2"
                            th:if="${exitoUsername}">

                            <i class="bi bi-check-circle-fill"></i>
                            <span th:text="${exitoUsername}"></span>

                        </div>

                        <div class="alert alert-info border-0 shadow-sm rounded-3 d-flex align-items-center gap-2 py-2"
                            th:if="${infoUsername}">

                            <i class="bi bi-info-circle-fill"></i>
                            <span th:text="${infoUsername}"></span>

                        </div>

                        <form method="post" th:action="@{/settings/username}">

                            <input type="hidden" name="idUsuario" th:value="${user.idUsuario}">

                            <div class="mb-3">

                                <label class="form-label small text-muted">
                                    Nuevo nombre
                                </label>

                                <input type="text" class="form-control rounded-3 shadow-none" name="username"
                                    th:value="${user.username}" th:classappend="${errorUsername} ? 'is-invalid' : ''"
                                    required>

                                <div class="invalid-feedback" th:if="${errorUsername}" th:text="${errorUsername}">
                                </div>

                            </div>

                            <button type="submit"
                                class="btn btn-primary rounded-3 shadow-none d-inline-flex align-items-center gap-2">

                                <i class="bi bi-check2-circle"></i>
                                Guardar cambios

                            </button>

                        </form>

                    </div>

                </div>

                <!-- CARD 2: PASSWORD -->
                <div class="card border-0 shadow-sm rounded-4">

                    <div class="card-body p-4">

                        <div class="mb-4">

                            <h5 class="fw-semibold d-flex align-items-center gap-2 mb-1">
                                <i class="bi bi-lock text-primary"></i>
                                Cambiar contraseña
                            </h5>

                            <p class="text-muted small mb-0">
                                Mantén tu cuenta segura actualizando tu contraseña.
                            </p>

                        </div>

                        <!-- ALERTS -->
                        <div class="alert alert-danger border-0 shadow-sm rounded-3 d-flex align-items-center gap-2 py-2"
                            th:if="${errorPassword}">

                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <span th:text="${errorPassword}"></span>

                        </div>

                        <div class="alert alert-success border-0 shadow-sm rounded-3 d-flex align-items-center gap-2 py-2"
                            th:if="${exitoPassword}">

                            <i class="bi bi-check-circle-fill"></i>
                            <span th:text="${exitoPassword}"></span>

                        </div>

                        <form method="post" th:action="@{/settings/password}">

                            <div class="mb-3">

                                <label class="form-label small text-muted">
                                    Nueva contraseña
                                </label>

                                <input type="password" class="form-control rounded-3 shadow-none" name="password"
                                    required>

                            </div>

                            <button type="submit"
                                class="btn btn-danger rounded-3 shadow-none d-inline-flex align-items-center gap-2">

                                <i class="bi bi-shield-lock"></i>
                                Cambiar contraseña

                            </button>

                        </form>

                    </div>

                </div>

            </div>
            <!-- Bootstrap JS -->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configuración de usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <div class="container-fluid">

        <div class="row min-vh-100">

            <!-- SIDEBAR -->
            <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

                <h3 class="fw-bold mb-4">
                    <i class="bi bi-geo-alt-fill text-primary"></i>
                    SeniaMaps
                </h3>

                <div class="mb-4">

                    <small class="text-secondary">
                        Usuario conectado
                    </small>

                    <h5 class="mt-2">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${username}"></span>
                    </h5>

                </div>

                <hr class="border-secondary">

                <div class="d-grid gap-2">

                    <a href="/home" class="btn btn-outline-light text-start">
                        <i class="bi bi-house-door"></i>
                        Inicio
                    </a>

                    <a href="/history" class="btn btn-outline-light text-start">
                        <i class="bi bi-clock-history"></i>
                        Historial
                    </a>

                    <a href="/settings" class="btn btn-outline-light text-start">
                        <i class="bi bi-gear"></i>
                        Configuración
                    </a>

                    <a href="/logout" class="btn btn-danger text-start mt-4">
                        <i class="bi bi-box-arrow-right"></i>
                        Cerrar sesión
                    </a>

                </div>

            </div>

            <!-- MAIN CONTENT -->
            <div class="col-md-9 col-lg-10 p-5">

                <h2 class="mb-4">
                    <i class="bi bi-gear"></i>
                    Configuración de usuario
                </h2>

                <!-- CARD 1 -->
                <div class="card shadow-sm mb-4 border-0 rounded-4">

                    <div class="card-body p-4">

                        <h5 class="mb-3">
                            <i class="bi bi-person"></i>
                            Cambiar nombre de usuario
                        </h5>

                        <form method="post" th:action="@{/settings/username}">

                            <div class="mb-3">
                                <label class="form-label">Nuevo nombre</label>
                                <input type="text" class="form-control" name="username" th:value="${user.username}"
                                    required>
                            </div>

                            <button type="submit" class="btn btn-primary">
                                Guardar nombre
                            </button>

                        </form>

                    </div>

                </div>

                <!-- CARD 2 -->
                <div class="card shadow-sm border-0 rounded-4">

                    <div class="card-body p-4">

                        <h5 class="mb-3">
                            <i class="bi bi-lock"></i>
                            Cambiar contraseña
                        </h5>

                        <form method="post" th:action="@{/settings/password}">

                            <div class="mb-3">
                                <label class="form-label">Nueva contraseña</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>

                            <button type="submit" class="btn btn-danger">
                                Cambiar contraseña
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>

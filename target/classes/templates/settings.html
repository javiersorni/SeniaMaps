<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configuración de usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light">

    <div class="container-fluid">

        <div class="row min-vh-100">

            <!-- SIDEBAR -->
            <div class="col-md-3 col-lg-2 bg-dark text-white p-4">

                <h3 class="fw-bold mb-4">
                    <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="32" class="me-2">
                    SeniaMaps
                </h3>

                <div class="mb-4">

                    <small class="text-secondary">
                        Usuario conectado
                    </small>

                    <h5 class="mt-2">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${#strings.capitalize(username)}"></span>
                    </h5>

                </div>

                <hr class="border-secondary">

                <div class="d-grid gap-2">

                    <a href="/home" class="btn btn-outline-light text-start">
                        <i class="bi bi-house-door"></i>
                        Inicio
                    </a>

                    <a href="/history" class="btn btn-outline-light text-start">
                        <i class="bi bi-clock-history"></i>
                        Historial
                    </a>
                    
                    <a href="/favoritos" class="btn btn-outline-light text-start">
                        <i class="bi bi-star"></i> Mis Favoritos
                    </a>

                    <!-- ACTIVO -->
                    <a href="/settings" class="btn btn-primary text-start">
                        <i class="bi bi-gear"></i>
                        Configuración
                    </a>

                    <a href="/logout" class="btn btn-danger text-start mt-4">
                        <i class="bi bi-box-arrow-right"></i>
                        Cerrar sesión
                    </a>

                </div>

            </div>

            <!-- MAIN CONTENT -->
            <div class="col-md-9 col-lg-10 p-5">

                <h2 class="mb-4">
                    <i class="bi bi-gear"></i>
                    Configuración de usuario
                </h2>

                <!-- CARD 1: CAMBIAR USERNAME -->
                <div class="card shadow-sm mb-4 border-0 rounded-4">

                    <div class="card-body p-4">

                        <h5 class="mb-3">
                            <i class="bi bi-person"></i>
                            Cambiar nombre de usuario
                        </h5>

                        <!-- ALERTAS USERNAME -->
                        <div class="alert alert-danger d-flex align-items-center small py-2 mb-3" th:if="${errorUsername}">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span th:text="${errorUsername}"></span>
                        </div>

                        <div class="alert alert-success d-flex align-items-center small py-2 mb-3" th:if="${exitoUsername}">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            <span th:text="${exitoUsername}"></span>
                        </div>

                        <div class="alert alert-info d-flex align-items-center small py-2 mb-3" th:if="${infoUsername}">
                            <i class="bi bi-info-circle-fill me-2"></i>
                            <span th:text="${infoUsername}"></span>
                        </div>

                        <form method="post" th:action="@{/settings/username}">

                            <div class="mb-3">
                                <label class="form-label">Nuevo nombre</label>
                                <input type="text" 
                                       class="form-control" 
                                       name="username" 
                                       th:value="${user.username}"
                                       th:classappend="${errorUsername} ? 'is-invalid' : ''"
                                       required>
                                
                                <!-- FEEDBACK VISUAL INPUT INVALID -->
                                <div class="invalid-feedback" th:if="${errorUsername}" th:text="${errorUsername}"></div>
                            </div>

                            <button type="submit" class="btn btn-primary">
                                Guardar nombre
                            </button>

                        </form>

                    </div>

                </div>

                <!-- CARD 2: CAMBIAR CONTRASEÑA -->
                <div class="card shadow-sm border-0 rounded-4">

                    <div class="card-body p-4">

                        <h5 class="mb-3">
                            <i class="bi bi-lock"></i>
                            Cambiar contraseña
                        </h5>

                        <!-- ALERTAS PASSWORD -->
                        <div class="alert alert-danger d-flex align-items-center small py-2 mb-3" th:if="${errorPassword}">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span th:text="${errorPassword}"></span>
                        </div>

                        <div class="alert alert-success d-flex align-items-center small py-2 mb-3" th:if="${exitoPassword}">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            <span th:text="${exitoPassword}"></span>
                        </div>

                        <form method="post" th:action="@{/settings/password}">

                            <div class="mb-3">
                                <label class="form-label">Nueva contraseña</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>

                            <button type="submit" class="btn btn-danger">
                                Cambiar contraseña
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mis Favoritos - SeniaMaps</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Just Sans (fuente principal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="shortcut icon" th:href="@{/cropped-CENTRADO-NEGRO-150x150.jpg}" type="image/x-icon">
</head>

<body class="bg-light text-dark"
    style="font-family: 'Just Sans','Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">

    <!-- ===== NAVBAR MÓVIL (hamburguesa) ===== -->
    <nav class="navbar navbar-light bg-white border-bottom d-md-none sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center text-primary fw-semibold" href="#">
                <img th:src="@{/Logo_azul_degradado_FV_2lineas_FV_logo_v3_2lineas.svg}" alt="Logo" height="28"
                    class="me-2">
                SeniaMaps
            </a>
            <button class="btn btn-outline-primary" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMobile">
                <i class="bi bi-list fs-4"></i>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="sidebarMobile">

        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title text-primary fw-semibold">SeniaMaps</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body p-0">
            <div th:replace="fragments/sidebar :: sidebar('favoritos')"></div>
        </div>

    </div>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <aside
                class="col-md-3 col-lg-2 d-none d-md-flex flex-column bg-white border-end shadow-sm p-0 position-sticky top-0"
                style="height:100vh;">

                <div th:replace="~{fragments/sidebar :: sidebar('favoritos')}"></div>

            </aside>

            <div class="col-md-9 col-lg-10 p-4 p-lg-5">

                <!-- PAGE HEADER -->
                <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-5">

                    <div>

                        <h1 class="fw-bold mb-1">
                            Mis Sitios Favoritos
                        </h1>

                        <p class="text-muted mb-0">
                            Gestiona tus lugares guardados, ratings y etiquetas.
                        </p>

                    </div>

                    <a href="/export/csv" class="btn btn-success rounded-3 shadow-none d-flex align-items-center gap-2">

                        <i class="bi bi-file-earmark-spreadsheet"></i>
                        Exportar CSV

                    </a>

                </div>

                <!-- ALERTAS -->
                <div th:if="${param.success != null and param.success[0] == 'deleted'}"
                    class="alert alert-success border-0 shadow-sm rounded-3 d-flex align-items-center gap-2">

                    <i class="bi bi-check-circle-fill"></i>

                    <span>
                        Eliminado correctamente
                    </span>

                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert">
                    </button>

                </div>

                <div th:if="${errorEtiqueta}"
                    class="alert alert-danger border-0 shadow-sm rounded-3 d-flex align-items-center gap-2">

                    <i class="bi bi-exclamation-triangle-fill"></i>

                    <span th:text="${errorEtiqueta}"></span>

                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert">
                    </button>

                </div>

                <div th:if="${exitoEtiqueta}"
                    class="alert alert-success border-0 shadow-sm rounded-3 d-flex align-items-center gap-2">

                    <i class="bi bi-check-circle-fill"></i>

                    <span th:text="${exitoEtiqueta}"></span>

                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert">
                    </button>

                </div>

                <!-- EMPTY STATE -->
                <div th:if="${#lists.isEmpty(listaFavoritos)}"
                    class="card border-0 shadow-sm rounded-4 text-center p-5">

                    <div class="card-body py-5">

                        <div class="mb-4">

                            <i class="bi bi-star text-muted" style="font-size: 4rem;"></i>

                        </div>

                        <h4 class="fw-semibold mb-2">
                            Aún no tienes favoritos
                        </h4>

                        <p class="text-muted mb-0">
                            Los lugares guardados aparecerán aquí automáticamente.
                        </p>

                    </div>

                </div>

                <!-- FAVORITOS -->
                <div th:if="${not #lists.isEmpty(listaFavoritos)}" class="row g-4">

                    <div class="col-12 col-md-6 col-xl-4" th:each="fav : ${listaFavoritos}">

                        <div class="card border-0 shadow-sm rounded-4 h-100">

                            <div class="card-body p-4 d-flex flex-column">

                                <!-- TOP -->
                                <div class="d-flex align-items-start justify-content-between mb-3">

                                    <div>

                                        <h5 class="fw-semibold mb-1" th:text="${fav.resultado.nombre}">
                                        </h5>

                                        <p class="text-muted small mb-0">

                                            <i class="bi bi-geo-alt"></i>

                                            <span
                                                th:text="${fav.resultado.direccion != null ? fav.resultado.direccion : 'No disponible'}">
                                            </span>

                                        </p>

                                    </div>

                                    <span class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2">

                                        <i class="bi bi-star-fill"></i>

                                    </span>

                                </div>

                                <!-- CATEGORIAS -->
                                <div class="mb-4">

                                    <label class="form-label small text-muted mb-2">
                                        Categorías
                                    </label>

                                    <div class="d-flex flex-wrap gap-2">

                                        <span th:if="${fav.resultado.categorias != null}"
                                            th:each="cat : ${fav.resultado.categorias}"
                                            class="badge text-bg-light border rounded-pill px-3 py-2">

                                            <span th:text="${cat}"></span>

                                        </span>

                                        <span th:if="${fav.resultado.categorias == null}"
                                            class="badge text-bg-light border rounded-pill px-3 py-2">

                                            General

                                        </span>

                                    </div>

                                </div>

                                <!-- RATING -->
                                <div class="mb-4">

                                    <label class="form-label small text-muted">
                                        Rating personal
                                    </label>

                                    <div class="d-flex align-items-center gap-2 mb-3">

                                        <span class="badge bg-warning-subtle text-warning rounded-pill px-3 py-2">

                                            <i class="bi bi-star-fill"></i>

                                            <span
                                                th:text="${fav.resultado.userRating != null ? fav.resultado.userRating : '0'}">
                                            </span>

                                        </span>

                                    </div>

                                    <form method="post" action="/favoritos/rating/update" class="d-flex gap-2">

                                        <input type="hidden" name="idResultado"
                                            th:value="${fav.resultado.idResultado}" />

                                        <input type="number" name="rating" class="form-control rounded-3 shadow-none"
                                            min="0" max="5" step="0.1" placeholder="0 - 5" required />

                                        <button type="submit" class="btn btn-outline-warning rounded-3">

                                            <i class="bi bi-check-lg"></i>

                                        </button>

                                    </form>

                                </div>

                                <!-- ETIQUETAS -->
                                <div class="mb-4">

                                    <label class="form-label small text-muted mb-2">
                                        Etiquetas
                                    </label>

                                    <div class="d-flex flex-wrap gap-2">

                                        <div th:each="et : ${fav.resultado.etiquetas}"
                                            class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2 d-flex align-items-center gap-2">

                                            <i class="bi bi-tag-fill"></i>

                                            <span th:text="${et}"></span>

                                            <form method="post" action="/etiquetas/delete-etiqueta" class="m-0">

                                                <input type="hidden" name="resultadoId"
                                                    th:value="${fav.resultado.idResultado}">

                                                <input type="hidden" name="tagName" th:value="${et}">

                                                <button type="submit" class="btn-close" style="font-size: .55rem;">
                                                </button>

                                            </form>

                                        </div>

                                        <span th:if="${#lists.isEmpty(fav.resultado.etiquetas)}"
                                            class="text-muted small fst-italic">

                                            Sin etiquetas

                                        </span>

                                    </div>

                                </div>

                                <!-- ACTIONS -->
                                <div class="mt-auto">

                                    <div class="d-grid gap-2">

                                        <button
                                            class="btn btn-outline-primary rounded-3 d-flex align-items-center justify-content-center gap-2"
                                            type="button" data-bs-toggle="modal" data-bs-target="#modalEtiqueta"
                                            th:data-id="${fav.resultado.idResultado}"
                                            th:data-nombre="${fav.resultado.nombre}" onclick="configurarModal(this)">

                                            <i class="bi bi-tag"></i>
                                            Añadir etiqueta

                                        </button>

                                        <form th:action="@{/favoritos/eliminar}" method="post"
                                            class="m-0 js-delete-favorito">

                                            <input type="hidden" name="idFavorito" th:value="${fav.idFavorito}" />

                                            <button type="submit"
                                                class="btn btn-outline-danger rounded-3 w-100 d-flex align-items-center justify-content-center gap-2">

                                                <i class="bi bi-trash"></i>
                                                Quitar favorito
                                            </button>

                                        </form>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- MODAL -->
            <div class="modal fade" id="modalEtiqueta" tabindex="-1">

                <div class="modal-dialog modal-dialog-centered">

                    <div class="modal-content border-0 rounded-4 shadow-sm">

                        <div class="modal-header border-0 pb-0">

                            <h5 class="modal-title fw-semibold d-flex align-items-center gap-2">

                                <i class="bi bi-tag text-primary"></i>
                                Añadir etiqueta

                            </h5>

                            <button type="button" class="btn-close" data-bs-dismiss="modal">
                            </button>

                        </div>

                        <form method="post" th:action="@{/favoritos/etiqueta/add}">

                            <div class="modal-body py-4">

                                <input type="hidden" name="idResultado" id="idResultadoModal">

                                <div>

                                    <label class="form-label small text-muted mb-2">
                                        Nombre de la etiqueta
                                    </label>

                                    <input type="text" class="form-control rounded-3 shadow-none" name="nombreEtiqueta"
                                        placeholder="Ej: Restaurante, Café, Trabajo..." required>

                                </div>

                            </div>

                            <div class="modal-footer border-0 pt-0">

                                <button type="button" class="btn btn-light border rounded-3" data-bs-dismiss="modal">

                                    Cancelar

                                </button>

                                <button type="submit" class="btn btn-primary rounded-3 shadow-none">

                                    Guardar etiqueta

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
            <script>

                function configurarModal(button) {

                    document.getElementById('idResultadoModal').value =
                        button.getAttribute('data-id');

                }
                function confirmAction(message, onConfirm) {
                    document.getElementById('confirmModalBody').textContent = message;

                    const modalEl = document.getElementById('confirmModal');
                    const modal = bootstrap.Modal.getOrCreateInstance(modalEl);

                    const okBtn = document.getElementById('confirmModalOk');

                    const handler = () => {
                        okBtn.removeEventListener('click', handler);
                        modal.hide();
                        onConfirm();
                    };

                    okBtn.addEventListener('click', handler);
                    modal.show();
                }
                document.addEventListener("submit", function (e) {

                    const form = e.target.closest(".js-delete-favorito");
                    if (!form) return;

                    e.preventDefault();

                    confirmAction("¿Seguro que quieres eliminar este favorito?", () => {
                        form.submit();
                    });
                });

            </script>

            <!-- MODAL CONFIRMACIÓN -->
            <div class="modal fade" id="confirmModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content rounded-3 border-0 shadow">
                        <div class="modal-header">
                            <h5 class="modal-title text-primary">
                                <i class="bi bi-question-circle me-2"></i>Confirmar
                            </h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body" id="confirmModalBody">
                            ¿Continuar con la acción?
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary shadow-none" data-bs-dismiss="modal">
                                Cancelar
                            </button>
                            <button type="button" class="btn btn-primary shadow-none" id="confirmModalOk">
                                Confirmar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
</body>

</html>
